name: Deploy to Vercel

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    name: Trigger Vercel Deploy
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Trigger Vercel deploy hook
        run: |
          echo "Triggering Vercel deploy hook..."
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -X POST "${{ secrets.VERCEL_DEPLOY_HOOK_URL }}")
          echo "Response code: $RESPONSE"
          if [ "$RESPONSE" -lt 200 ] || [ "$RESPONSE" -ge 300 ]; then
            echo "Deploy hook failed with HTTP $RESPONSE"
            exit 1
          fi
          echo "Deploy hook triggered successfully."

      - name: Summary
        run: |
          echo "## Deploy Triggered" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Vercel deploy hook triggered after successful CI on \`main\`." >> $GITHUB_STEP_SUMMARY
          echo "Check the [Vercel dashboard](https://vercel.com/dashboard) for deployment status." >> $GITHUB_STEP_SUMMARY
